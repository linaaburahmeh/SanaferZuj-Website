    <style>
        body {
            background-color: #eef2dc;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            animation: fadeInMove 0.7s ease;
        }
@keyframes fadeInMove {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


        .div1 {
            background-color: transparent;
            color: #2f5d3a;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .div1 img {
            width: 80px;
            height: auto;
            border-radius: 50%;
            background-color: transparent;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .div1 img:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        #div2 {
            color: #2f5d3a;
            width: 100%;
            background-color: transparent;
            height: 1000px;
            padding: 10px;
            margin: auto;
        }

        .divb {
            color: #2f5d3a;
            width: 250px;
            height: 250px;
            text-align: center;
            background-color: #ffffff;
            border-radius: 16px;
            /* نفس About Us */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin: auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;

        }

        .divb:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .imgr {
            height: 50%;
            border-radius: 5px;
            padding-top: 15px;
        }

        .buttona {
            width: 100px;
            height: 25px;
            color: white;
            border-radius: 5px;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
            background-color: #2f5d3a;
            border: 1px solid #2f5d3a;
            transform: all 0.1s ease;
            cursor: pointer;
        }

        .buttona:active {
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
            transform: translateY(4px) scale(0.98);
        }

        p {


            font-size: 14px;
        }

        .x {
            display: flex;
            width: 70%;
            margin: auto;
            padding-top: 30px;
        }

        img {
            border-radius: 5px;

        }

        /*--------------------------------------------------------------------*/
        .page-title {
            color: #2f5d3a;
            font-size: 50px;
            text-align: center;
            margin-top: 80px;
            margin-bottom: 20px;
        }

        .page-hr {
            width: 50%;
            border: 1px solid #b7c8b5;
            margin: auto;
        }

        .divb p {
            color: #3f3f3f;
            font-size: 16px;
            margin: 10px 0;
        }

        .divb p:first-of-type {
            /* خلي اسم الكلية اوضح*/
            font-weight: 600;
            color: #2f5d3a;
        }

        /*--------------------------------------------------------------------*/
    </style>
</head>
