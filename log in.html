<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in - SANAFER ZUJ</title>
    <style>
       
@keyframes fadeInMove {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
        body {
             margin: 0;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    color: #333;
    min-height: 100vh;
    background: url("images/background1.jpg") center / cover no-repeat;
    animation: fadeInMove 0.7s ease forwards;
     animation: fadeInMove 0.7s ease;

        }

        #box1 {
            width: 100%;
            height: 1000px;
            background-color: #F5F5F5;
        }

        #box2 {
            background-color: #ffffff;
            width: 400px;
            margin: 120px auto;
            text-align: center;
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .emailandpass {
            width: 85%;
            height: 38px;
            margin: 12px 0;
            text-align: center;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .emailandpass:focus {
            outline: none;
            border-color: #2f5d3a;
        }

        #log {
            width: 60%;
            height: 38px;
            border-radius: 25px;
            background-color: #2f5d3a;
            color: white;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #log:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        #box2 h2 {
            color: #2f5d3a;
            margin-bottom: 20px;
        }

        #error {
            color: #c62828;
            font-size: 14px;
            margin-top: 5px;
        }
         .logo {
            position: absolute;
            /* عشان نثبتها فوق */
            top: 20px;
            /* المسافة من الأعلى */
            right: 20px;
            /* المسافة من اليسار، ممكن تغيّريها right إذا بدك الزاوية اليمنى */
        }

        .logo img {
            width: 80px;
            /* حجم صغير للوجو */
            height: auto;
            /* يحافظ على النسبة */
            border-radius: 50%;
            /* يجعل الصورة دائرية */
            background-color: transparent;
            /* يحاول يخلي الخلفية شفافة */
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            /* ظل خفيف */
            cursor: pointer;
        }

        .logo img:hover {
            transform: scale(1.1);
            /* يكبر شوي */
            opacity: 0.8;
            /* يصير شبه شفاف شوي */
        }
    </style>
</head>

<body>
    <div>
        <header>
             <div class="logo">
            <a href="index.html" class="logo" title="Home Page">
                <img src="images/LOGO.jpeg" alt="SANAFERZUJ Logo">
            </a>
        </div>
           
        </header>
        <div id="box2">
            <h2>Welcome to Sanafer Zuj</h2>
            <input type="email" placeholder="example@std-zuj.edu.jo" class="emailandpass" id="email">
            <input type="password" placeholder="********" class="emailandpass" id="password">
            <p id="error"></p>
            <input type="button" value="Log in" id="log" onclick="checkLogin()">

            <script>
                function checkLogin() {
                    const correctEmail = "admin";
                    const correctPassword = "admin";

                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;
                    const error = document.getElementById("error");

                    if (email === correctEmail && password === correctPassword) {
                        window.location.href = "home.html"; // إعادة توجيه
                    } else {
                        error.textContent = "Incorrect input";
                        alert(" Incorrect info , Try Again")
                    }
                }
            </script>

        </div>

    </div>
</body>

</html>
